<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Observabilidad — Vicepresidencia de Tecnología</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bolivar-green: #1a7a3c;
    --bolivar-green-light: #2a9a50;
    --bolivar-green-dark: #0f5228;
    --bg: #f4f6f3;
    --surface: #ffffff;
    --surface2: #f0f2ee;
    --border: rgba(26,122,60,0.12);
    --text: #1a2018;
    --text2: #4a5a46;
    --text3: #7a8a76;
    --red: #d63a3a;
    --amber: #d97706;
    --green-ok: #16a34a;
    --panel-w: 400px;
    --header-h: 64px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    background: var(--bolivar-green);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
    border-bottom: 2px solid var(--bolivar-green-dark);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-badge {
    width: 38px; height: 38px; border-radius: 8px;
    background: white; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--bolivar-green); font-size: 13px; letter-spacing: -0.5px;
  }
  .header-title { color: white; }
  .header-title h1 { font-size: 15px; font-weight: 600; line-height: 1.2; }
  .header-title p { font-size: 11px; font-weight: 300; opacity: 0.75; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge-live {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 4px 12px; font-size: 11px; color: white; font-weight: 500;
  }
  .badge-live::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Main layout ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Looker iframe ── */
  .looker-pane {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .looker-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Chat panel ── */
  .chat-panel {
    width: var(--panel-w);
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }
  .chat-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .chat-header-top h2 { font-size: 13px; font-weight: 600; color: var(--bolivar-green); }
  .ai-tag {
    font-size: 10px; font-weight: 500; background: #e8f5ee; color: var(--bolivar-green);
    border: 1px solid rgba(26,122,60,0.2); border-radius: 4px; padding: 2px 6px;
  }
  .chat-header p { font-size: 11px; color: var(--text3); line-height: 1.4; }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; max-width: 92%; }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }
  .msg-label { font-size: 10px; color: var(--text3); padding: 0 4px; }
  .msg.user .msg-label { text-align: right; }

  .bubble {
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
  }
  .user .bubble {
    background: var(--bolivar-green);
    color: white;
    border-bottom-right-radius: 3px;
  }
  .bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  /* Metrics card inside bubble */
  .metrics-wrap { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .metric-row {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 11px;
  }
  .metric-row .m-label { font-size: 11px; color: var(--text2); }
  .metric-row .m-val { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .m-bar { height: 3px; border-radius: 2px; background: #e5e7e4; margin-top: 3px; position: relative; overflow: hidden; }
  .m-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  .bottleneck-list { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .bt-item {
    display: flex; align-items: flex-start; gap: 7px;
    background: white; border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px; font-size: 12px;
  }
  .bt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }

  .rec-list { margin-top: 6px; padding-left: 15px; font-size: 12px; color: var(--text2); line-height: 1.8; }

  .quick-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .chip {
    font-size: 11px; padding: 4px 10px; border-radius: 14px;
    border: 1px solid rgba(26,122,60,0.25); background: #eef7f1;
    color: var(--bolivar-green); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .chip:hover { background: #d8edd e; }

  .typing-bubble {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; border-bottom-left-radius: 3px;
    width: fit-content;
  }
  .typing-bubble span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); animation: blink 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* ── Input ── */
  .chat-input-wrap {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); background: var(--surface2);
    line-height: 1.5; max-height: 80px; min-height: 36px;
    outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--bolivar-green); }
  button.send {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--bolivar-green); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  button.send:hover { background: var(--bolivar-green-light); }
  button.send:disabled { background: #ccc; cursor: not-allowed; }
  button.send svg { width: 16px; height: 16px; fill: white; }
  .input-hint { font-size: 10px; color: var(--text3); margin-top: 5px; }

  /* ── Resize handle ── */
  .resize-handle {
    width: 4px; background: transparent; cursor: col-resize;
    flex-shrink: 0; transition: background 0.15s; position: relative;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--bolivar-green); }

  /* Tag styles */
  .tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin: 2px 2px 0 0; font-weight: 500; }
  .tag-red { background: #fef2f2; color: #b91c1c; }
  .tag-amber { background: #fffbeb; color: #92400e; }
  .tag-green { background: #f0fdf4; color: #166534; }
  .tag-blue { background: #eff6ff; color: #1d4ed8; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-badge">SB</div>
    <div class="header-title">
      <h1>Tablero de Observabilidad</h1>
      <p>Vicepresidencia de Tecnología — Seguros Bolívar</p>
    </div>
  </div>
  <div class="header-right">
    <div class="badge-live">En vivo</div>
  </div>
</header>

<div class="main">

  <!-- Looker Studio -->
  <div class="looker-pane" id="looker-pane">
    <iframe
      src="https://lookerstudio.google.com/embed/reporting/f5325d2c-d497-4285-952e-80febcf7b152/page/p_ldk7fh9htd"
      allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
    </iframe>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-top">
        <h2>Agente IA · Análisis</h2>
        <span class="ai-tag">Claude AI</span>
      </div>
      <p>Pregúntame sobre el tablero: cuellos de botella, dependencias, bloqueos y más.</p>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input-wrap">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ej: ¿Qué cuello de botella hay en el backlog EO?" rows="1"></textarea>
        <button class="send" id="send-btn" title="Enviar">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>
  </div>
</div>

<script>
const SYSTEM = `Eres un agente IA experto en análisis del tablero de observabilidad de la Vicepresidencia de Tecnología de Seguros Bolívar. El tablero muestra:
- 12 Tribus/Chapters, 50 Squads, 43 Iniciativas EO en curso, 11 Proyectos en curso
- Participación Errores Productivos en Backlog: 21% (meta <20%) — ROJO
- % Recuperación Errores: 40% (meta 85%) — ROJO
- Gestión del Backlog EO, Proyectos con entregables de valor comprometidos 2026

Cuando el usuario pregunte sobre el tablero, analiza los datos conocidos y responde en JSON puro (sin markdown):

Para análisis con métricas:
{
  "type": "analysis",
  "summary": "resumen en 2 oraciones",
  "metrics": {
    "dep_probability": <0-100>,
    "block_probability": <0-100>,
    "complexity": <0-100>,
    "risk": <0-100>
  },
  "bottlenecks": [{"name":"...","severity":"alta|media|baja","description":"..."}],
  "tags": ["tag1","tag2"],
  "recommendations": ["rec1","rec2","rec3"],
  "quick_questions": ["pregunta1","pregunta2","pregunta3"]
}

Para respuestas conversacionales:
{
  "type": "chat",
  "message": "respuesta aquí",
  "quick_questions": ["pregunta1","pregunta2","pregunta3"]
}

Usa los datos reales del tablero. Sé específico con los porcentajes y metas.`;

let history = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function getColor(v) {
  if (v >= 70) return '#d63a3a';
  if (v >= 40) return '#d97706';
  return '#16a34a';
}

function buildAnalysisBubble(d) {
  let html = `<p style="font-size:13px;line-height:1.55;margin-bottom:8px">${d.summary}</p>`;

  if (d.tags?.length) {
    html += '<div style="margin-bottom:8px">';
    d.tags.forEach(t => { html += `<span class="tag tag-blue">${t}</span>`; });
    html += '</div>';
  }

  html += `<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;letter-spacing:0.5px">MÉTRICAS</div>`;
  html += '<div class="metrics-wrap">';
  const ms = [
    {k:'dep_probability',l:'Prob. dependencia'},
    {k:'block_probability',l:'Prob. bloqueo'},
    {k:'complexity',l:'Complejidad'},
    {k:'risk',l:'Riesgo global'}
  ];
  ms.forEach(m => {
    const v = d.metrics[m.k]||0;
    const c = getColor(v);
    html += `<div class="metric-row">
      <div>
        <div class="m-label">${m.l}</div>
        <div class="m-bar" style="width:100px"><div class="m-fill" style="width:${v}%;background:${c}"></div></div>
      </div>
      <div class="m-val" style="color:${c}">${Math.round(v)}%</div>
    </div>`;
  });
  html += '</div>';

  if (d.bottlenecks?.length) {
    html += `<div style="font-size:11px;font-weight:600;color:var(--text3);margin:10px 0 5px;letter-spacing:0.5px">CUELLOS DE BOTELLA</div>`;
    html += '<div class="bottleneck-list">';
    d.bottlenecks.forEach(b => {
      const dc = b.severity==='alta'?'#d63a3a':b.severity==='media'?'#d97706':'#16a34a';
      const tc = b.severity==='alta'?'tag-red':b.severity==='media'?'tag-amber':'tag-green';
      html += `<div class="bt-item">
        <div class="bt-dot" style="background:${dc}"></div>
        <div>
          <strong style="font-size:12px">${b.name}</strong>
          <span class="tag ${tc}" style="margin-left:4px">${b.severity}</span>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${b.description}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  if (d.recommendations?.length) {
    html += `<div style="font-size:11px;font-weight:600;color:var(--text3);margin:10px 0 5px;letter-spacing:0.5px">RECOMENDACIONES</div>`;
    html += '<ul class="rec-list">';
    d.recommendations.forEach(r => { html += `<li>${r}</li>`; });
    html += '</ul>';
  }

  if (d.quick_questions?.length) {
    html += '<div class="quick-chips">';
    d.quick_questions.forEach(q => {
      html += `<span class="chip" onclick="sendQuestion('${q.replace(/'/g,"&apos;")}')">${q}</span>`;
    });
    html += '</div>';
  }

  return html;
}

function buildChatBubble(d) {
  let html = `<p style="font-size:13px;line-height:1.55">${d.message}</p>`;
  if (d.quick_questions?.length) {
    html += '<div class="quick-chips">';
    d.quick_questions.forEach(q => {
      html += `<span class="chip" onclick="sendQuestion('${q.replace(/'/g,"&apos;")}')">${q}</span>`;
    });
    html += '</div>';
  }
  return html;
}

function addMsg(role, html, isElement) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'Tú' : 'Agente IA';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isElement) bubble.appendChild(html);
  else bubble.innerHTML = html;
  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrapper;
}

function addTyping() {
  const w = document.createElement('div');
  w.className = 'msg bot';
  w.id = 'typing';
  const l = document.createElement('div');
  l.className = 'msg-label';
  l.textContent = 'Agente IA';
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(l); w.appendChild(b);
  messagesEl.appendChild(w);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return w;
}

window.sendQuestion = function(q) {
  inputEl.value = q;
  handleSend();
};

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;
  autoResize();

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const typing = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const raw = (data.content||[]).map(b=>b.text||'').join('');
    history.push({ role: 'assistant', content: raw });
    typing.remove();

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    } catch {
      addMsg('bot', `<p style="font-size:13px">${raw}</p>`);
      return;
    }

    if (parsed.type === 'analysis') {
      addMsg('bot', buildAnalysisBubble(parsed));
    } else {
      addMsg('bot', buildChatBubble(parsed));
    }
  } catch(e) {
    typing.remove();
    addMsg('bot', '<p style="font-size:13px;color:#d63a3a">Error al conectar con el agente. Recarga la página.</p>');
  }
  sendBtn.disabled = false;
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
}

sendBtn.addEventListener('click', handleSend);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
inputEl.addEventListener('input', autoResize);

// Resize panel handle
const handle = document.getElementById('resize-handle');
const lookerPane = document.getElementById('looker-pane');
const chatPanel = document.getElementById('chat-panel');
let dragging = false, startX, startPanelW;

handle.addEventListener('mousedown', e => {
  dragging = true;
  startX = e.clientX;
  startPanelW = chatPanel.offsetWidth;
  handle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const diff = startX - e.clientX;
  const newW = Math.max(300, Math.min(600, startPanelW + diff));
  chatPanel.style.width = newW + 'px';
});
document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  handle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// Welcome message
(function() {
  const welcome = {
    type: 'chat',
    message: 'Hola 👋 Soy tu agente de análisis integrado al tablero de Seguros Bolívar. Puedo analizar los datos que ves en el reporte y darte métricas como:<br><br>• Probabilidad de bloqueo y dependencia<br>• Cuellos de botella del backlog<br>• Riesgo del portafolio<br>• Recomendaciones de mejora',
    quick_questions: [
      '¿Cuál es el riesgo del backlog EO actual?',
      'Analiza el % de recuperación de errores',
      '¿Qué cuellos de botella hay en los squads?'
    ]
  };
  const w = document.createElement('div');
  w.className = 'msg bot';
  const l = document.createElement('div');
  l.className = 'msg-label';
  l.textContent = 'Agente IA';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = buildChatBubble(welcome);
  w.appendChild(l); w.appendChild(b);
  messagesEl.appendChild(w);
})();
</script>
</body>
</html>
